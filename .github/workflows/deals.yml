name: Canadian Deals Bot

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes (GitHub may delay a few min)
  workflow_dispatch:          # lets you press "Run workflow" manually

concurrency:
  group: deals-bot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-deals:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Check feeds and post new deals
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python3 deals_bot.py --once

      - name: Remember which deals were already posted
        run: |
          git config user.name "deals-bot"
          git config user.email "deals-bot@users.noreply.github.com"
          git add seen.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "update seen deals [skip ci]"
          git push
